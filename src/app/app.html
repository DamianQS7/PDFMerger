<main class="min-h-screen bg-gray-50 py-12 px-4">
  <div class="max-w-2xl mx-auto">

    <!-- Header -->
    <div class="text-center mb-10">
      <div class="flex justify-center mb-4">
        <svg class="w-14 h-14 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
        </svg>
      </div>
      <h1 class="text-4xl font-bold text-gray-900 mb-2">PDF Merger</h1>
      <p class="text-gray-500 text-base">Combine multiple PDF files into one. All processing happens locally in your browser.</p>
    </div>

    <!-- Drop zone -->
    <app-drop-zone (filesSelected)="addFiles($event)" />

    <!-- Error message -->
    @if (errorMessage()) {
      <div class="mt-4 flex items-start gap-2 bg-amber-50 border border-amber-200 text-amber-800 rounded-lg px-4 py-3 text-sm">
        <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
        </svg>
        <span>{{ errorMessage() }}</span>
      </div>
    }

    <!-- File list -->
    @if (files().length > 0) {
      <app-files-list  [files]="files()" (pdfsEmitter)="updateFilesInList($event)"/>

      <!-- Merge hint -->
      @if (!canMerge()) {
        <p class="text-center text-sm text-gray-400 mt-4">Add at least one more file to merge.</p>
      }

      <!-- Merge button -->
      <div class="mt-6 flex justify-center">
        <button
          class="inline-flex items-center gap-2 px-8 py-3 rounded-xl font-semibold text-white transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed shadow-sm"
          [class.bg-blue-600]="!isMerging()"
          [class.hover:bg-blue-700]="!isMerging()"
          [class.bg-blue-400]="isMerging()"
          [disabled]="!canMerge() || isMerging()"
          (click)="mergePdfs()"
        >
          @if (isMerging()) {
            <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Merging...
          } @else {
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
            </svg>
            Merge &amp; Download
          }
        </button>
      </div>
    }

  </div>
</main>
