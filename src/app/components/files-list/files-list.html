<div class="mt-6">
    <div class="flex justify-between items-center mb-3">
        <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">
            {{ files().length }} file{{ files().length === 1 ? '' : 's' }} queued
        </h2>
        <button
            class="text-sm text-gray-400 hover:text-red-500 transition-colors"
            (click)="emitPdfs(clearAllPdfs)"
        >
            Clear all
        </button>
    </div>

    <ul class="space-y-2">
        @for (file of files(); track file.id; let i = $index; let last = $last) {
            <li class="flex items-center gap-3 bg-white border border-gray-200 rounded-lg px-4 py-3 shadow-sm">
                <!-- PDF icon -->
                <svg class="w-5 h-5 text-red-400 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>

                <!-- Order badge -->
                <span class="text-xs font-mono text-gray-400 w-5 text-center shrink-0">{{ i + 1 }}</span>

                <!-- File name -->
                <span class="flex-1 text-sm font-medium text-gray-800 truncate" [title]="file.name">{{ file.name }}</span>

                <!-- File size -->
                <span class="text-xs text-gray-400 shrink-0">{{ formatSize(file.size) }}</span>

                <!-- Controls -->
                <div class="flex gap-1 shrink-0">
                    <button
                        class="p-1.5 rounded hover:bg-gray-100 text-gray-400 hover:text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                        [disabled]="i === 0"
                        (click)="emitPdfs(() => moveUpInList(i))"
                        title="Move up"
                    >
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75 12 8.25l7.5 7.5" />
                        </svg>
                    </button>
                    <button
                        class="p-1.5 rounded hover:bg-gray-100 text-gray-400 hover:text-gray-700 disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                        [disabled]="last"
                        (click)="emitPdfs(() => moveDownInList(i))"
                        title="Move down"
                    >
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                        </svg>
                    </button>
                    <button
                        class="p-1.5 rounded hover:bg-red-50 text-gray-400 hover:text-red-500 transition-colors"
                        (click)="emitPdfs(() => removeFile(file.id))"
                        title="Remove"
                    >
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </li>
        }
    </ul>
</div>
