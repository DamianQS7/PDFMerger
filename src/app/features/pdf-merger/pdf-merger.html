<main class="min-h-screen bg-slate-100 dark:bg-gray-900 py-12 px-4 transition-colors duration-300">
  <div class="mx-auto" [class]="canMerge() ? 'max-w-7xl flex gap-10 items-start' : 'max-w-2xl'">

    <!-- Left column -->
    <div class="flex-1 min-w-0">

      <!-- Header -->
      <div class="relative text-center mb-10">

        <!-- Dark mode toggle -->
        <button
          class="absolute right-0 top-0 p-2 bg-white dark:border-gray-600 dark:bg-gray-800 border border-gray-200 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors"
          (click)="themeService.toggleDarkMode()"
          [title]="themeService.isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          @if (themeService.isDarkMode()) {
            <!-- Sun icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
          } @else {
            <!-- Moon icon -->
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
          }
        </button>

        <div class="flex justify-center mb-4">
          <svg class="w-14 h-14 text-red-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
          </svg>
        </div>
        <h1 class="text-4xl font-bold text-gray-900 dark:text-white mb-2">PDF Merger</h1>
        <p class="text-gray-500 dark:text-gray-400 text-base">Combine multiple PDF files into one. All processing happens locally in your browser.</p>
      </div>

      <!-- Drop zone -->
      <app-drop-zone (filesSelected)="addFiles($event)" />

      <!-- Error message -->
      @if (errorMessage()) {
        <div class="mt-4 flex items-start gap-2 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-700 text-amber-800 dark:text-amber-400 rounded-lg px-4 py-3 text-sm">
          <svg class="w-4 h-4 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
          </svg>
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <!-- File list -->
      @if (files().length > 0) {

        <app-files-list [files]="files()" (pdfsEmitter)="updateFilesInList($event)" />

        <!-- Merge hint -->
        @if (!canMerge()) {
          <p class="text-center text-sm text-gray-400 dark:text-gray-500 mt-4">Add at least one more file to merge.</p>
        }

        <!-- Merge button -->
        <app-merge-button
          [isMerging]="isMerging()"
          [canMerge]="canMerge()"
          (mergePdfs)="mergePdfs()"
        />
      }

    </div>

    <!-- Right column: preview panel, only rendered when 2+ files are loaded -->
    @if (canMerge()) {
      <div class="flex-2 min-w-0 preview-enter">
        <app-pdf-preview [files]="files()" />
      </div>
    }

  </div>
</main>
